spring.application.name=ecommerseproject
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerse_database
spring.datasource.username=root
spring.datasource.password=iamdevil90
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
